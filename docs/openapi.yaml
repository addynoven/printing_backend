  # ── Billing ─────────────────────────────────────────────────────────────────
  /billing:
    post:
      tags: [Billing]
      summary: Generate a bill for an order
      description: |
        Two bill types:
        - **raw** — records the raw/unbranded cost; series `RAW-YYYY-NNN`; `isProtected: true`
        - **gst** — generates a tax invoice with CGST/SGST at 9% each; series `TAX-YYYY-NNN`

        Line items are auto-derived from `order.items`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBillRequest'
      responses:
        '201':
          description: Created bill
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bill'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Order not found

  /billing/order/{orderId}:
    get:
      tags: [Billing]
      summary: Get all bills for an order
      parameters:
        - $ref: '#/components/parameters/orderId'
      responses:
        '200':
          description: Bill list
          content:
            application/json:
