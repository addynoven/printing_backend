openapi: 3.0.3

info:
  title: POMS API
  description: |
    **Print Operations Management System** — REST API for managing print job orders,
    staff tasks, inventory, billing, payments, and analytics.

    ## Authentication
    Every endpoint except `POST /auth/login` requires a Bearer JWT in the
    `Authorization` header.

    ## Error shape
    All errors return `{ "error": "<message>" }` with the appropriate HTTP status.

    ## Roles & permissions
    | Role | orders | tasks | billing | payments | inventory | machines | analytics | users |
    |------|--------|-------|---------|----------|-----------|----------|-----------|-------|
    | super_admin | CRUD | CRUD | CRUD | CRUD | CRUD | CRUD | R | CRUD |
    | admin | CRU | CRUD | R | CRU | CRU | CRU | R | CRU |
    | sub_admin | CRU | CRU | R | R | R | R | — | R |
    | designer | R | CRU (own) | — | — | R | — | — | — |
    | *_staff | R (own) | RU (own) | — | — | R | — | — | — |

  version: 1.0.0
  contact:
    email: capitalcurv8@gmail.com

servers:
  - url: http://localhost:5000/api/v1
    description: Local development

tags:
  - name: Auth
    description: Login and current-user
  - name: Users
    description: Staff management
  - name: Orders
    description: Print job orders and state machine
  - name: Tasks
    description: Production tasks auto-assigned from orders
  - name: Payments
    description: Advance, partial, and final payments
  - name: Billing
    description: Raw and GST bills
  - name: Inventory
    description: Materials, stock levels, and ledger
  - name: Machines
    description: Production equipment
  - name: Notifications
    description: In-app notifications per user
  - name: Barcodes
    description: QR code generation and scan events
  - name: Analytics
    description: Aggregated business metrics

security:
  - bearerAuth: []

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # ─── Reusable parameters ────────────────────────────────────────────────────
  parameters:
    id:
      name: id
      in: path
      required: true
      schema:
        type: string
        example: 6655a1b2c3d4e5f6a7b8c9d0
    orderId:
      name: orderId
      in: path
      required: true
      schema:
        type: string
        example: 6655a1b2c3d4e5f6a7b8c9d0

  # ─── Reusable responses ──────────────────────────────────────────────────────
  responses:
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: Unauthorized
    Forbidden:
      description: Authenticated but insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: Forbidden
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: Not found
    BadRequest:
      description: Validation error or invalid state transition
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: Duplicate unique field
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  # ─── Schemas ────────────────────────────────────────────────────────────────
  schemas:

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string

    # Auth ────────────────────────────────────────────────────────────────────
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: admin@poms.com
        password:
          type: string
          minLength: 1
          example: password123

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          description: "Signed JWT — include as `Authorization: Bearer <token>`"
        user:
          $ref: '#/components/schemas/User'

    # Users ───────────────────────────────────────────────────────────────────
    Role:
      type: string
      enum:
        - super_admin
        - admin
        - sub_admin
        - designer
        - flex_printing_staff
        - screen_printing_staff
        - helper_staff
        - expose_staff
        - binder_staff
        - offset_staff
        - cutting_staff
        - laser_cut_staff
        - acrylic_printing_staff
        - glass_printing_staff

    User:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/Role'
        phone:
          type: string
        isAvailable:
          type: boolean
        activeTaskCount:
          type: integer
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateUserRequest:
      type: object
      required: [name, email, password, role]
      properties:
        name:
          type: string
          minLength: 2
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        role:
          $ref: '#/components/schemas/Role'
        phone:
          type: string

    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/Role'
        phone:
          type: string

    UserList:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/User'
        total:
          type: integer

    # Orders ──────────────────────────────────────────────────────────────────
    JobType:
      type: string
      enum:
        - flex_printing
        - screen_printing
        - design
        - laser_cut
        - offset
        - acrylic
        - glass
        - binding

    OrderStatus:
      type: string
      enum:
        - draft
        - confirmed
        - designing
        - in_production
        - finishing
        - completed
        - invoiced
        - cancelled

    Priority:
      type: string
      enum: [normal, urgent]

    OrderItem:
      type: object
      required: [description, quantity, unit, unitPrice]
      properties:
        description:
          type: string
        quantity:
          type: number
          minimum: 0
        unit:
          type: string
          example: sqft
        unitPrice:
          type: number
          minimum: 0

    BomEntry:
      type: object
      properties:
        materialId:
          type: string
        name:
          type: string
        unit:
          type: string
        qty:
          type: number

    StatusHistory:
      type: object
      properties:
        status:
          type: string
        changedBy:
          type: string
        note:
          type: string
        at:
          type: string
          format: date-time

    Order:
      type: object
      properties:
        _id:
          type: string
        orderNumber:
          type: string
          example: ORD-2024-0001
        customer:
          type: object
          properties:
            name:
              type: string
            phone:
              type: string
            email:
              type: string
              format: email
        jobType:
          $ref: '#/components/schemas/JobType'
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        bom:
          type: array
          items:
            $ref: '#/components/schemas/BomEntry'
        rawCost:
          type: number
        taxableValue:
          type: number
        billSplitPct:
          type: number
          minimum: 0
          maximum: 100
        hsnCode:
          type: string
        status:
          $ref: '#/components/schemas/OrderStatus'
        statusHistory:
          type: array
          items:
            $ref: '#/components/schemas/StatusHistory'
        priority:
          $ref: '#/components/schemas/Priority'
        deadline:
          type: string
          format: date-time
        advancePaid:
          type: number
        notes:
          type: string
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateOrderRequest:
      type: object
      required: [customer, jobType, items, rawCost, taxableValue, billSplitPct]
      properties:
        customer:
          type: object
          required: [name, phone]
          properties:
            name:
              type: string
              minLength: 2
            phone:
              type: string
              minLength: 7
            email:
              type: string
              format: email
        jobType:
          $ref: '#/components/schemas/JobType'
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/OrderItem'
        bom:
          type: array
          items:
            $ref: '#/components/schemas/BomEntry'
        rawCost:
          type: number
          minimum: 0
        taxableValue:
          type: number
          minimum: 0
        billSplitPct:
          type: number
          minimum: 0
          maximum: 100
        hsnCode:
          type: string
        priority:
          $ref: '#/components/schemas/Priority'
        deadline:
          type: string
          format: date-time
        notes:
          type: string

    UpdateOrderRequest:
      type: object
      properties:
        customer:
          type: object
          properties:
            name:
              type: string
            phone:
              type: string
            email:
              type: string
              format: email
        rawCost:
          type: number
        taxableValue:
          type: number
        billSplitPct:
          type: number
        hsnCode:
          type: string
        priority:
          $ref: '#/components/schemas/Priority'
        deadline:
          type: string
          format: date-time
        notes:
          type: string

    SetOrderStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          $ref: '#/components/schemas/OrderStatus'
        note:
          type: string

    OrderList:
      type: object
      properties:
        orders:
          type: array
          items:
            $ref: '#/components/schemas/Order'
        total:
          type: integer

    # Tasks ───────────────────────────────────────────────────────────────────
    TaskStatus:
      type: string
      enum: [unassigned, assigned, in_progress, paused, done]

    Task:
      type: object
      properties:
        _id:
          type: string
        orderId:
          type: string
        type:
          $ref: '#/components/schemas/JobType'
        assignedTo:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/TaskStatus'
        priority:
          $ref: '#/components/schemas/Priority'
        startedAt:
          type: string
          format: date-time
        pausedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        totalMinutes:
          type: integer
        notes:
          type: string
        createdAt:
          type: string
          format: date-time

    TaskList:
      type: object
      properties:
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'
        total:
          type: integer

    UpdateTaskStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          $ref: '#/components/schemas/TaskStatus'
        notes:
          type: string

    AssignTaskRequest:
      type: object
      required: [assignedTo]
      properties:
        assignedTo:
          type: string
          description: User ID of the staff member

    # Payments ────────────────────────────────────────────────────────────────
    PaymentType:
      type: string
      enum: [advance, final, partial]

    PaymentMethod:
      type: string
      enum: [cash, upi, card]

    PaymentStatus:
      type: string
      enum: [pending, completed, refunded]

    Payment:
      type: object
      properties:
        _id:
          type: string
        orderId:
          type: string
        billId:
          type: string
        type:
          $ref: '#/components/schemas/PaymentType'
        amount:
          type: number
        method:
          $ref: '#/components/schemas/PaymentMethod'
        status:
          $ref: '#/components/schemas/PaymentStatus'
        referenceId:
          type: string
        collectedBy:
          type: string
        paidAt:
          type: string
          format: date-time
        notes:
          type: string
        createdAt:
          type: string
          format: date-time

    CreatePaymentRequest:
      type: object
      required: [orderId, type, amount, method]
      properties:
        orderId:
          type: string
        billId:
          type: string
        type:
          $ref: '#/components/schemas/PaymentType'
        amount:
          type: number
          minimum: 0
        method:
          $ref: '#/components/schemas/PaymentMethod'
        referenceId:
          type: string
        notes:
          type: string

    PaymentList:
      type: object
      properties:
        payments:
          type: array
          items:
            $ref: '#/components/schemas/Payment'
        total:
          type: integer

    # Billing ─────────────────────────────────────────────────────────────────
    BillType:
      type: string
      enum: [raw, gst]

    BillLineItem:
      type: object
      properties:
        description:
          type: string
        qty:
          type: number
        rate:
          type: number
        amount:
          type: number

    Bill:
      type: object
      properties:
        _id:
          type: string
        orderId:
          type: string
        type:
          $ref: '#/components/schemas/BillType'
        seriesNumber:
          type: string
          example: TAX-2024-001
        amount:
          type: number
        isProtected:
          type: boolean
          description: Raw bills are password-protected
        lineItems:
          type: array
          items:
            $ref: '#/components/schemas/BillLineItem'
        taxableAmount:
          type: number
          description: GST bills only
        cgst:
          type: number
          description: GST bills only — 9%
        sgst:
          type: number
          description: GST bills only — 9%
        totalAmount:
          type: number
          description: GST bills only — taxableAmount + cgst + sgst
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time

    CreateBillRequest:
      type: object
      required: [orderId, type]
      properties:
        orderId:
          type: string
        type:
          $ref: '#/components/schemas/BillType'

    BillList:
      type: object
      properties:
        bills:
          type: array
          items:
            $ref: '#/components/schemas/Bill'
        total:
          type: integer

    # Inventory ───────────────────────────────────────────────────────────────
    MaterialCategory:
      type: string
      enum: [flex, paper, ink, acrylic, glass, other]

    MaterialUnit:
      type: string
      enum: [sqft, ml, sheets, kg, pcs]

    LedgerType:
      type: string
      enum: [DEDUCT, RESTOCK, REVERSAL, ADJUSTMENT]

    Material:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        category:
          $ref: '#/components/schemas/MaterialCategory'
        unit:
          $ref: '#/components/schemas/MaterialUnit'
        stock:
          type: number
        threshold:
          type: number
          description: Low-stock alert fires when stock ≤ threshold
        costPerUnit:
          type: number
        supplier:
          type: object
          properties:
            name:
              type: string
            phone:
              type: string
            email:
              type: string
              format: email
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time

    StockLedgerEntry:
      type: object
      properties:
        _id:
          type: string
        materialId:
          type: string
        orderId:
          type: string
        type:
          $ref: '#/components/schemas/LedgerType'
        qty:
          type: number
        balanceAfter:
          type: number
        note:
          type: string
        performedBy:
          type: string
        createdAt:
          type: string
          format: date-time

    CreateMaterialRequest:
      type: object
      required: [name, category, unit, threshold, costPerUnit]
      properties:
        name:
          type: string
          minLength: 2
        category:
          $ref: '#/components/schemas/MaterialCategory'
        unit:
          $ref: '#/components/schemas/MaterialUnit'
        stock:
          type: number
          minimum: 0
        threshold:
          type: number
          minimum: 0
        costPerUnit:
          type: number
          minimum: 0
        supplier:
          type: object
          properties:
            name:
              type: string
            phone:
              type: string
            email:
              type: string
              format: email

    RestockRequest:
      type: object
      required: [qty]
      properties:
        qty:
          type: number
          minimum: 0
        note:
          type: string

    MaterialList:
      type: object
      properties:
        materials:
          type: array
          items:
            $ref: '#/components/schemas/Material'
        total:
          type: integer

    # Machines ────────────────────────────────────────────────────────────────
    MachineType:
      type: string
      enum:
        - flex_printer
        - screen_printer
        - laser_cutter
        - offset_printer
        - acrylic_printer
        - glass_printer

    MachineStatus:
      type: string
      enum: [active, maintenance, inactive]

    Machine:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        type:
          $ref: '#/components/schemas/MachineType'
        department:
          type: string
        status:
          $ref: '#/components/schemas/MachineStatus'
        notes:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateMachineRequest:
      type: object
      required: [name, type, department]
      properties:
        name:
          type: string
          minLength: 2
        type:
          $ref: '#/components/schemas/MachineType'
        department:
          type: string
          minLength: 2
        status:
          $ref: '#/components/schemas/MachineStatus'
        notes:
          type: string

    MachineList:
      type: object
      properties:
        machines:
          type: array
          items:
            $ref: '#/components/schemas/Machine'
        total:
          type: integer

    # Notifications ───────────────────────────────────────────────────────────
    Notification:
      type: object
      properties:
        _id:
          type: string
        userId:
          type: string
        type:
          type: string
          example: task_assigned
        title:
          type: string
        message:
          type: string
        read:
          type: boolean
        createdAt:
          type: string
          format: date-time

    NotificationList:
      type: object
      properties:
        notifications:
          type: array
          items:
            $ref: '#/components/schemas/Notification'
        total:
          type: integer

    UnreadCount:
      type: object
      properties:
        count:
          type: integer

    # Barcodes ────────────────────────────────────────────────────────────────
    BarcodeType:
      type: string
      enum: [initial, final]

    Barcode:
      type: object
      properties:
        _id:
          type: string
        orderId:
          type: string
        type:
          $ref: '#/components/schemas/BarcodeType'
        code:
          type: string
        qrDataUrl:
          type: string
          description: Base64-encoded PNG data URL
        createdAt:
          type: string
          format: date-time

    ScanEvent:
      type: object
      properties:
        _id:
          type: string
        orderId:
          type: string
        scannedBy:
          type: string
        action:
          type: string
        notes:
          type: string
        ip:
          type: string
        timestamp:
          type: string
          format: date-time

    GenerateBarcodeRequest:
      type: object
      required: [orderId, type]
      properties:
        orderId:
          type: string
        type:
          $ref: '#/components/schemas/BarcodeType'

    ScanRequest:
      type: object
      required: [action]
      properties:
        action:
          type: string
          minLength: 1
          example: received
        notes:
          type: string

    BarcodeList:
      type: object
      properties:
        barcodes:
          type: array
          items:
            $ref: '#/components/schemas/Barcode'
        total:
          type: integer

    # Analytics ───────────────────────────────────────────────────────────────
    Overview:
      type: object
      properties:
        orders:
          type: integer
        tasks:
          type: integer
        revenue:
          type: number
        lowStock:
          type: integer

    StatusCount:
      type: object
      properties:
        _id:
          type: string
        count:
          type: integer

    OrderStats:
      type: object
      properties:
        byStatus:
          type: array
          items:
            $ref: '#/components/schemas/StatusCount'

    MethodRevenue:
      type: object
      properties:
        _id:
          type: string
          description: Payment method
        total:
          type: number
        count:
          type: integer

    RevenueStats:
      type: object
      properties:
        byMethod:
          type: array
          items:
            $ref: '#/components/schemas/MethodRevenue'
        total:
          type: number

    TaskStatusStat:
      type: object
      properties:
        _id:
          type: string
        count:
          type: integer
        avgMinutes:
          type: number

    TaskStats:
      type: object
      properties:
        byStatus:
          type: array
          items:
            $ref: '#/components/schemas/TaskStatusStat'

# ═══════════════════════════════════════════════════════════════════════════════
# PATHS
# ═══════════════════════════════════════════════════════════════════════════════
paths:

  # ── Auth ────────────────────────────────────────────────────────────────────
  /auth/login:
    post:
      tags: [Auth]
      summary: Obtain a JWT
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ── Users ───────────────────────────────────────────────────────────────────
  /users:
    get:
      tags: [Users]
      summary: List all users
      description: Requires `users.read`. Filter by role, availability, or active status.
      parameters:
        - name: role
          in: query
          schema:
            $ref: '#/components/schemas/Role'
        - name: isAvailable
          in: query
          schema:
            type: boolean
        - name: isActive
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: User list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      tags: [Users]
      summary: Create a new user / staff account
      description: Requires `users.create`. Password is hashed server-side.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  /users/{id}:
    get:
      tags: [Users]
      summary: Get user by ID
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: User
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Users]
      summary: Update user details
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
