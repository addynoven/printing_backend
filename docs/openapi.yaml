          content:
            application/json:
              schema:
                type: object
                properties:
                  order:
                    $ref: '#/components/schemas/Order'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [Barcodes]
      summary: Record a scan event for an order
      description: Logs the action, actor, IP, and optional notes. Requires `tasks.update`.
      parameters:
        - $ref: '#/components/parameters/orderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScanRequest'
      responses:
        '200':
          description: Scan event created
          content:
            application/json:
              schema:
                type: object
                properties:
                  scanEvent:
                    $ref: '#/components/schemas/ScanEvent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Analytics ───────────────────────────────────────────────────────────────
  /analytics/overview:
    get:
      tags: [Analytics]
      summary: Dashboard KPIs — total orders, tasks, revenue, and low-stock count
      description: Revenue sums only `completed` payments.
      responses:
        '200':
          description: Overview metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Overview'
              example:
                orders: 142
                tasks: 89
                revenue: 285000
                lowStock: 3
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /analytics/orders:
    get:
      tags: [Analytics]
      summary: Order count grouped by status
      responses:
        '200':
          description: Order stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderStats'
              example:
                byStatus:
                  - _id: draft
                    count: 12
                  - _id: confirmed
                    count: 8
                  - _id: completed
                    count: 34
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /analytics/revenue:
    get:
      tags: [Analytics]
      summary: Revenue grouped by payment method with overall total
      description: Only `completed` payments are counted.
      responses:
        '200':
          description: Revenue stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevenueStats'
              example:
                byMethod:
                  - _id: cash
                    total: 150000
                    count: 42
                  - _id: upi
                    total: 95000
                    count: 31
                total: 245000
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /analytics/tasks:
    get:
      tags: [Analytics]
      summary: Task count and average duration grouped by status
      responses:
        '200':
          description: Task stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskStats'
              example:
                byStatus:
                  - _id: done
                    count: 56
                    avgMinutes: 48
                  - _id: in_progress
                    count: 12
                    avgMinutes: 0
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
