      description: Does not adjust stock — use `/restock` for that.
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                category:
                  $ref: '#/components/schemas/MaterialCategory'
                threshold:
                  type: number
                costPerUnit:
                  type: number
                supplier:
                  type: object
                  properties:
                    name:
                      type: string
                    phone:
                      type: string
                    email:
                      type: string
                      format: email
      responses:
        '200':
          description: Updated material
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Material'
        '400':
