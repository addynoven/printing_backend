        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{id}/availability:
    patch:
      tags: [Users]
      summary: Toggle staff availability (isAvailable)
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Orders ──────────────────────────────────────────────────────────────────
  /orders:
    get:
      tags: [Orders]
      summary: List orders
      description: |
        Supports filtering by status, jobType, priority, and date range.
        Staff roles with `own` scope only see their own orders.
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/OrderStatus'
        - name: jobType
          in: query
          schema:
            $ref: '#/components/schemas/JobType'
        - name: priority
          in: query
          schema:
            $ref: '#/components/schemas/Priority'
        - name: from
          in: query
          description: ISO date lower bound (createdAt ≥ from)
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          description: ISO date upper bound (createdAt ≤ to)
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Order list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      tags: [Orders]
      summary: Create a new order (starts in `draft`)
      description: |
        On creation the order number is auto-generated (`ORD-YYYY-NNNN`).
        Status is always `draft` — use `PATCH /{id}/status` to advance it.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
            example:
              customer:
                name: Alice Corp
                phone: "9876543210"
                email: alice@corp.com
              jobType: flex_printing
              items:
                - description: Flex Banner 4x8
                  quantity: 2
                  unit: sqft
                  unitPrice: 250
              rawCost: 500
              taxableValue: 300
              billSplitPct: 40
              priority: normal
      responses:
        '201':
          description: Created order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /orders/{id}:
    get:
      tags: [Orders]
      summary: Get order by ID
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Orders]
      summary: Update order fields (customer, costs, priority, etc.)
      description: Does not change status. Use `/status` for that.
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrderRequest'
      responses:
        '200':
          description: Updated order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Orders]
      summary: Cancel an order
      description: Transitions to `cancelled`. Triggers inventory reversal if stock was deducted.
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '204':
          description: Cancelled
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /orders/{id}/status:
    patch:
      tags: [Orders]
      summary: Advance the order through the state machine
      description: |
        **Valid transitions:**
        ```
        draft → confirmed → designing → in_production → finishing → completed → invoiced
        draft/confirmed/designing → cancelled
        ```
        **Side effects triggered automatically:**
        - `confirmed`: task is auto-assigned to the least-loaded available staff
        - `completed`: inventory deducted from BOM; final QR barcode generated
        - `cancelled`: previously deducted inventory is reversed
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetOrderStatusRequest'
      responses:
        '200':
          description: Updated order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          description: Invalid or disallowed transition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Invalid transition: draft → invoiced"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /orders/{id}/timeline:
    get:
      tags: [Orders]
      summary: Get the full status history for an order
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Status history array
          content:
            application/json:
              schema:
                type: object
                properties:
                  timeline:
                    type: array
                    items:
                      $ref: '#/components/schemas/StatusHistory'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

